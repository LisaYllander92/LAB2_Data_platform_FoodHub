# To run Docker Compose:
# $ docker compose up --build

# Contains a list of abstract-multi-containers
services:
  postgres:
    image: postgres:16
    container_name: postgres

    # Points to .env variables
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  kafka:
      image: apache/kafka:4.1.1
      container_name: kafka_foodhub
      #ports:
        # host -> kafka (for tools running on your laptop)
       # - "29092:29092"
      volumes:
        - kafka_data:/var/lib/kafka/data
        #- kafka_data:/bitnami
      environment:
        KAFKA_NODE_ID: "1"
        KAFKA_PROCESS_ROLES: "broker,controller"
        KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
        KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
        KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
        KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui_foodhub
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka      # condition -> service_started

  kafka-init:
    image: apache/kafka:4.1.1
    container_name: kafka-init_foodhub
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c", "sleep 5 && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic recipe-request --partitions 1 --replication-factor 1"]

  consumer:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - kafka
    command: [ "uv", "run", "python", "-u", "app/consumer/consumer.py" ]

  app:
    build: .  # searches for Dockerfile (creates image)
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8000:8000"

# Make PostgreSQL stateful
volumes:
  postgres_data:
  kafka_data: # Is this truly necessary?